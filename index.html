<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>挪车联系车主</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 340px;
            width: 100%;
        }

        .car-icon {
            font-size: 60px;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 22px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 14px;
            color: #999;
            margin-bottom: 30px;
        }

        .call-btn {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            padding: 16px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .call-btn:active {
            transform: scale(0.96);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .note {
            margin-top: 25px;
            font-size: 12px;
            color: #bbb;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="car-icon">🚗</div>
        <h2>挪车联系车主</h2>
        <p class="subtitle">扫码即拨，隐私保护</p>

        <a href="tel:15346727165" class="call-btn">📞 一键拨号</a>

        <p class="note">
            点击按钮即可联系车主<br>
            您的号码对双方均不可见<br>
            感谢理解与配合 🤝
        </p>
    </div>
</body>
</html>
